<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 200px;
        padding: 16px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f5f0e8;
        color: #1a1a1a;
        margin: 0;
      }
      .title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 12px;
        opacity: 0.5;
      }
      .status {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 12px;
      }
      a {
        display: block;
        font-size: 11px;
        color: #1a1a1a;
        text-decoration: none;
        border-bottom: 1px solid #1a1a1a;
        padding-bottom: 2px;
        width: fit-content;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="title">Interest Badge</div>
    <div class="status" id="status">Active</div>
    <a href="https://twitter-interest-badge.vercel.app" target="_blank"
      >Manage interests</a
    >
  </body>
</html>
